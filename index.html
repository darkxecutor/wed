<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web development</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {margin:0;padding:0;box-sizing:border-box;}

    body {
      font-family: "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;

      /* 🎨 Custom Theme Colors */
      background: radial-gradient(circle at 20% 30%, #FBB0EA55, transparent 40%),
                  radial-gradient(circle at 80% 70%, #FBB0EA33, transparent 40%),
                  linear-gradient(135deg, #080209, #120414, #1a061d);
    }

    .footer {width:100%;padding:40px 20px;}

    .footer-inner {
      max-width:1100px;
      margin:auto;
      border-radius:30px;
      padding:40px;

      /* Glass Pink Style */
      background: linear-gradient(135deg, rgba(251,176,234,0.15), rgba(255,255,255,0.03));
      backdrop-filter: blur(30px);

      border:1px solid rgba(251,176,234,0.3);
      box-shadow:0 20px 50px rgba(251,176,234,0.2);
    }

    .footer-top {
      display:flex;
      justify-content:space-between;
      gap:40px;
      margin-bottom:30px;
    }

    .footer-left {max-width:400px;}

    .logo {
      height:36px;
      margin-bottom:15px;
      filter: drop-shadow(0 0 12px #FBB0EA);
    }

    .footer-left p {
      color:#f5d9f0;
      line-height:1.6;
      margin-bottom:20px;
    }

    .links {display:flex;gap:20px;}

    .links a {
      color:#fff;
      text-decoration:none;
      font-weight:500;
      position:relative;
    }

    .links a::after {
      content:"";
      position:absolute;
      width:0%;
      height:2px;
      bottom:-4px;
      left:0;
      background:#FBB0EA;
      transition:0.3s;
    }

    .links a:hover::after {width:100%;}

    .buttons {display:flex;gap:15px;}

    .store-btn {
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 15px;
      border-radius:12px;

      background: linear-gradient(135deg, rgba(251,176,234,0.4), rgba(255,255,255,0.1));
      border:1px solid rgba(251,176,234,0.4);
      color:white;

      cursor:pointer;
      transition: all 0.3s ease;
    }

    .store-btn img {width:26px;}

    .store-btn .small {font-size:10px;display:block;}
    .store-btn .big {font-size:14px;font-weight:bold;}

    .store-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 30px rgba(251,176,234,0.6);
    }

    .footer-bottom {
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-top:1px solid rgba(251,176,234,0.2);
      padding-top:20px;
    }

    .footer-bottom p {color:#eac3e3;font-size:14px;}

    .socials {display:flex;gap:15px;}

    .socials a {
      color:white;
      font-size:20px;
      transition:0.3s;
    }

    .socials a:hover {
      transform:scale(1.3);
      color:#FBB0EA;
      text-shadow:0 0 12px #FBB0EA;
    }

    @media (max-width:768px){
      .footer-top {flex-direction:column;}

      .buttons {
        flex-direction:column;
        width:100%;
      }

      .store-btn {
        width:100%;
        justify-content:center;
      }

      .footer-bottom {
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
      }
    }
  </style>
</head>

<body>

  <footer class="footer">
    <div class="footer-inner">

      <div class="footer-top">

        <div class="footer-left">
          <img src="https://cdn-icons-png.flaticon.com/512/3810/3810073.png" class="logo" />

          <p>
            Our mission is to empower developers to build beautiful interfaces faster.
          </p>

          <div class="links">
            <a href="https://whatsapp.com/channel/0029Vb660XQ65yDGjrTGBM3g">About</a>
            <a href="https://whatsapp.com/channel/0029Vb660XQ65yDGjrTGBM3g">Contact</a>
            <a href="https://whatsapp.com/channel/0029Vb660XQ65yDGjrTGBM3g">Privacy</a>
          </div>
        </div>

        <div class="buttons">
          <div class="store-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732208.png" />
            <div>
              <span class="small">Get it on</span>
              <span class="big">Google Play</span>
            </div>
          </div>

          <div class="store-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/0/747.png" />
            <div>
              <span class="small">Download on the</span>
              <span class="big">App Store</span>
            </div>
          </div>
        </div>

      </div>

      <div class="footer-bottom">
        <p>© 2026 Web development. All rights reserved.</p>

        <div class="socials">
          <a href="https://whatsapp.com/channel/0029Vb660XQ65yDGjrTGBM3g"><i class="fa-brands fa-facebook"></i></a>
          <a href="https://whatsapp.com/channel/0029Vb660XQ65yDGjrTGBM3g"><i class="fa-brands fa-x-twitter"></i></a>
          <a href="https://whatsapp.com/channel/0029Vb660XQ65yDGjrTGBM3g"><i class="fa-brands fa-instagram"></i></a>
        </div>
      </div>

    </div>
  </footer>

</body>
</html>
